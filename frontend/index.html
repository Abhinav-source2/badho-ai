<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badho AI Career Coach</title>

<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* CHAT AREA */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* MESSAGE */
.msg {
  max-width: 760px;
  margin: 0 auto;
  line-height: 1.6;
}

/* USER */
.user {
  background: #1e1e2e;
  padding: 10px 14px;
  border-radius: 10px;
}

/* ASSISTANT */
.assistant {
  background: #161622;
  padding: 14px 16px;
  border-radius: 12px;
  border-left: 3px solid #7c3aed;
}

/* TEXT STYLING */
.assistant h1,
.assistant h2,
.assistant h3 {
  margin-top: 10px;
  margin-bottom: 6px;
  color: #c084fc;
}

.assistant p {
  margin: 6px 0;
}

.assistant ul {
  margin: 8px 0 8px 18px;
}

.assistant li {
  margin: 4px 0;
}

.assistant strong {
  color: #e9d5ff;
}

/* TOOL BADGE */
.tool-badge {
  display: inline-block;
  background: #1e3a2e;
  color: #4ade80;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
}

/* INPUT AREA */
#input-area {
  padding: 16px;
  background: #1a1a2e;
  display: flex;
  gap: 10px;
}

#input {
  flex: 1;
  background: #0f0f1a;
  border: 1px solid #333;
  color: #e0e0e0;
  padding: 10px 12px;
  border-radius: 8px;
  resize: none;
  height: 42px;
}

#send {
  background: #7c3aed;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
}

#send:disabled {
  opacity: 0.5;
}
</style>
</head>

<body>

<div id="messages">
  <div class="msg assistant">
    👋 Hi! I'm <b>Badho AI</b> — your AI career coach.
  </div>
</div>

<div id="input-area">
  <textarea id="input"
    placeholder="Ask about AI careers..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}">
  </textarea>
  <button id="send" onclick="send()">Send</button>
</div>

<script>
const SESSION_ID = crypto.randomUUID();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

/* ADD MESSAGE */
function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

/* SEND MESSAGE */
async function send() {
  const msg = inputEl.value.trim();
  if (!msg) return;

  inputEl.value = '';
  sendBtn.disabled = true;

  addMessage('user', msg);

  const assistantDiv = addMessage('assistant', "⏳ Thinking...");

  const response = await fetch('/chat/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: SESSION_ID, message: msg }),
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();

  let buffer = '';
  let fullText = '';
  let started = false;

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, {stream: true});
    const events = buffer.split('\n\n');
    buffer = events.pop();

    for (const event of events) {
      const lines = event.split('\n');
      let type = '';
      let data = '';

      for (const line of lines) {
        if (line.startsWith('event: ')) type = line.slice(7);
        if (line.startsWith('data: ')) data = line.slice(6);
      }

      if (!data) continue;

      try {
        const parsed = JSON.parse(data);

        if (type === 'token') {
          fullText += parsed.text;

          // remove "Thinking..." once real text starts
          if (!started && fullText.trim().length > 5) {
            assistantDiv.innerHTML = "";
            started = true;
          }

          assistantDiv.innerHTML = marked.parse(fullText);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        if (type === 'tool_called') {
          const badge = document.createElement('div');
          badge.className = 'tool-badge';
          badge.textContent = `🔧 ${parsed.tool_name}`;
          assistantDiv.appendChild(badge);
        }

        if (type === 'error') {
          assistantDiv.innerHTML = `<span style="color:#f87171">⚠️ ${parsed.message}</span>`;
        }

      } catch {}
    }
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>

</body>
</html>
