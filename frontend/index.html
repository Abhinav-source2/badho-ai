<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badho AI Career Coach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
  #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 780px; width: 100%; margin: 0 auto; }
  .user { background: #1e1e2e; padding: 12px 16px; border-radius: 12px; }
  .assistant { background: #161622; padding: 12px 16px; border-radius: 12px; border-left: 3px solid #7c3aed; white-space: pre-wrap; line-height: 1.6; }
  .tool-badge { display: inline-block; background: #1e3a2e; color: #4ade80; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin: 4px 2px; }
  .source-box { margin-top: 8px; font-size: 11px; color: #888; }
  #input-area { padding: 16px 24px; background: #1a1a2e; display: flex; gap: 10px; }
  #input { flex: 1; background: #0f0f1a; border: 1px solid #333; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 14px; resize: none; height: 44px; }
  #send { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #metrics-btn { background: #1e3a2e; color: #4ade80; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>

<div id="messages">
  <div class="msg assistant">👋 Hi! I'm Badho AI — your career coach for breaking into AI engineering. Ask me anything about transitioning to AI roles, salaries, interviews, or resumes.</div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Ask me about AI engineering careers..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
  <button id="send" onclick="send()">Send</button>
  <button id="metrics-btn" onclick="showMetrics()">Metrics</button>
</div>

<script>
const SESSION_ID = crypto.randomUUID();
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send');

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function send() {
  const msg = inputEl.value.trim();
  if (!msg) return;

  inputEl.value = '';
  sendBtn.disabled = true;

  addMessage('user', msg);

  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'msg assistant';
  assistantDiv.textContent = '';
  messagesEl.appendChild(assistantDiv);

  let sourceMeta = null;

  const response = await fetch('/chat/stream', {
    method : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body   : JSON.stringify({ session_id: SESSION_ID, message: msg }),
  });

  const reader  = response.body.getReader();
  const decoder = new TextDecoder();
  let   buffer  = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    // SSE events separated by double newline
    const events = buffer.split('\n\n');
    buffer = events.pop();

    for (const event of events) {
      const lines    = event.split('\n');
      let eventType  = 'message';
      let dataStr    = '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          dataStr = line.slice(6).trim();
        }
      }

      if (!dataStr) continue;

      try {
        const parsed = JSON.parse(dataStr);

        // TOKEN STREAM
        if (eventType === 'token' && parsed.text !== undefined) {
          assistantDiv.textContent += parsed.text;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // RETRIEVAL META
        if (eventType === 'retrieval_done') {
          sourceMeta = parsed;
        }

        // TOOL EVENTS
        if (eventType === 'tool_called') {
          const badge = document.createElement('span');
          badge.className = 'tool-badge';
          badge.textContent = `🔧 ${parsed.tool_name} (${parsed.latency_ms}ms)`;
          assistantDiv.appendChild(document.createElement('br'));
          assistantDiv.appendChild(badge);
        }

        // FINAL METRICS
        if (eventType === 'done' && sourceMeta) {
          const srcBox = document.createElement('div');
          srcBox.className = 'source-box';
          srcBox.textContent =
            `Retrieved ${sourceMeta.chunks_retrieved} → reranked to ${sourceMeta.chunks_returned} | ` +
            `Retrieval: ${sourceMeta.retrieval_ms}ms | ` +
            `Rerank: ${sourceMeta.rerank_ms}ms | ` +
            `TTFT: ${parsed.ttft_ms}ms | ` +
            `Cost: $${parsed.cost_usd}`;
          assistantDiv.appendChild(srcBox);
        }

        // ERROR
        if (eventType === 'error') {
          assistantDiv.textContent = `⚠️ ${parsed.message}`;
        }

      } catch {
        // ignore malformed chunks
      }
    }
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

async function showMetrics() {
  const res  = await fetch('/metrics');
  const data = await res.json();

  addMessage('assistant',
    `📊 METRICS\n` +
    `Turns: ${data.total_turns} | Sessions: ${data.total_sessions}\n` +
    `TTFT p50: ${data.ttft_p50_ms}ms | p95: ${data.ttft_p95_ms}ms\n` +
    `Total cost: $${data.total_cost_usd} | Avg/session: $${data.avg_cost_per_session}\n` +
    `Avg retrieval: ${data.avg_retrieval_ms}ms | Avg LLM: ${data.avg_llm_ms}ms\n` +
    `Status: ${data.status}`
  );
}
</script>

</body>
</html>
